{% extends 'base.html' %}

{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; width: 100%; padding-top: 20px;">
    
    <h1 style="color: white; margin-bottom: 40px; font-size: 2.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">
        Menu for {{ restaurant.name }}
    </h1>

    <div class="card-container" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; width: 90%;">
        {% for item in items %}
        <div class="card" style="background: rgba(0,0,0,0.7); padding: 25px; border-radius: 20px; width: 280px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px);">
            <img src="{{ item.picture }}" style="width: 100%; height: 180px; object-fit: cover; border-radius: 15px;">
            
            <h3 style="color: white; margin-top: 15px; font-size: 1.4rem;">{{ item.name }}</h3>
            <p style="color: #ccc; font-size: 0.9rem; margin: 10px 0; min-height: 45px;">{{ item.description }}</p>
            <p style="font-weight: bold; font-size: 1.3rem; color: #00d2ff;">₹ {{ item.price }}</p>
            
            <p style="margin: 10px 0;">
                {% if item.vegeterian %}
                    <span style="color: #4dfc4d;">🌱 Veg</span>
                {% else %}
                    <span style="color: #ff4d4d;">🥩 Non-Veg</span>
                {% endif %}
            </p>
            
            <div style="margin-top: 15px;">
                <a href="{% url 'add_to_cart' item.id username %}" 
                   style="background-color: #00d2ff; color: black; padding: 12px 25px; border-radius: 30px; text-decoration: none; display: inline-block; font-weight: bold; width: 80%;">
                   Add to Cart
                </a>
            </div>
        </div>
        {% endfor %}
    </div>

    <div style="margin: 50px 0;">
        <a href="{% url 'open_show_restaurant' %}" style="color: #00d2ff; text-decoration: none; font-weight: bold;">
            ← Back to Restaurants
        </a>
    </div>
</div>
{% endblock %}
